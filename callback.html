<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン中...</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  background: #f2f2f7;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  color: #1c1c1e;
}
.loading { text-align: center; }
.loading .emoji { font-size: 40px; margin-bottom: 12px; }
.loading p { font-size: 14px; color: #8e8e93; }
</style>
</head>
<body>
<div class="loading">
  <div class="emoji">🌆</div>
  <p id="status">ログイン中...</p>
</div>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) { window.location.href = '/'; return; }
  try {
    const res = await fetch('/api/line-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        code,
        redirect_uri: window.location.origin + '/callback.html'
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Auth failed');
    localStorage.setItem('urban_os_user', JSON.stringify(data.user));
    localStorage.setItem('urban_os_token', data.token);
    const pendingFriend = localStorage.getItem('pending_friend_uid');
    if (pendingFriend) {
      localStorage.removeItem('pending_friend_uid');
      window.location.href = '/invite.html?uid=' + pendingFriend;
    } else {
      window.location.href = '/';
    }
  } catch (e) {
    console.error('Login error:', e);
    document.getElementById('status').textContent = 'エラー: ' + e.message;
  }
})();
</script>
</body>
</html>
